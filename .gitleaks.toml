# .gitleaks.toml — secret-scan config for the security-scan.yml `secret-scan`
# job (BLOCKING — this is the one class of finding this repo never ships
# with). Extends gitleaks' built-in default ruleset; add real false positives
# to the allowlist below rather than disabling rules.
title = "cackle gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Paths and fixtures that legitimately contain non-secret, high-entropy-looking strings"
paths = [
  '''(^|/)go\.sum$''',
  '''(^|/)package-lock\.json$''',
  '''(^|/)THIRD-PARTY-NOTICES\.txt$''',
  '''(^|/)docs/screenshots/.*''',
]
# Deliberately fake payment-provider keys used in unit-test fixtures. These are
# English placeholder words, not the base62 blobs real keys are, and several
# exist specifically to prove an adapter REFUSES a real-looking secret. Matched
# by value so a genuinely leaked key in the same file is still caught.
regexes = [
  '''sk_test_definitelyreal''',
  '''sk_test_shouldnotmatter''',
  '''sk_(test|live)_(fake|example|placeholder|dummy|notreal|xxx+)[a-z_]*''',
]
